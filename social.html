  <script src="https://strava-embeds.com/embed.js"></script>
  <script async src="https://www.instagram.com/embed.js"></script>

  <script>
    const processedFrames = new WeakSet();
    const linkedinResizeObserver = new ResizeObserver(entries => {
      entries.forEach(entry => {
        const shell = entry.target;
        const frame = shell.querySelector('iframe');

        if (frame) {
          syncLinkedInHeight(frame);
        }
      });
    });

    function getEmbedShell(node) {
      return node?.closest('.social-embed') || null;
    }

    function initializeEmbedShells() {
      document.querySelectorAll('.social-embed').forEach(shell => {
        if (!shell.classList.contains('is-loaded')) {
          shell.classList.add('is-loading');
        }

        if (shell.classList.contains('social-embed--linkedin')) {
          linkedinResizeObserver.observe(shell);
        }
      });
    }

    function markCardLoaded(node) {
      const card = node?.closest('.social-card');
      const shell = getEmbedShell(node);

      if (card) {
        card.classList.add('loaded');
      }

      if (shell) {
        shell.classList.add('is-loaded');
        shell.classList.remove('is-loading');
      }
    }

    function applyEmbedHeight(frame, height) {
      if (!frame) return;
      const value = Math.round(Number(height));
      if (!Number.isFinite(value) || value <= 0) return;

      const shell = getEmbedShell(frame);

      frame.style.height = `${value}px`;

      if (shell) {
        shell.style.height = `${value}px`;
        shell.classList.add('is-measured');
      }

      markCardLoaded(frame);
    }

    function syncLinkedInHeight(frame) {
      const shell = getEmbedShell(frame);
      if (!shell) return;

      const width = shell.clientWidth;
      if (!width) return;

      const height = Math.round(Math.max(680, Math.min(980, width * 2.55)));
      applyEmbedHeight(frame, height);
    }

    function processFrame(frame) {
      if (processedFrames.has(frame)) return;
      processedFrames.add(frame);

      const shell = getEmbedShell(frame);

      frame.addEventListener('load', () => {
        if (shell?.classList.contains('social-embed--linkedin')) {
          syncLinkedInHeight(frame);
        }

        markCardLoaded(frame);
      });

      if (shell?.classList.contains('social-embed--linkedin')) {
        syncLinkedInHeight(frame);
      }
    }

    function scanForFrames() {
      initializeEmbedShells();
      document.querySelectorAll('.social-embed iframe').forEach(processFrame);
    }

    function findFrameBySource(source) {
      return Array.from(document.querySelectorAll('.social-embed iframe'))
        .find(frame => frame.contentWindow === source);
    }

    function processInstagram() {
      if (window.instgrm?.Embeds) {
        window.instgrm.Embeds.process();
      }
    }

    scanForFrames();
    processInstagram();

    const embedObserver = new MutationObserver(() => {
      scanForFrames();
      processInstagram();
    });

    embedObserver.observe(document.body, { childList: true, subtree: true });

    window.addEventListener('message', event => {
      const frame = findFrameBySource(event.source);
      if (!frame) return;

      if (event.origin.includes('strava-embeds.com') && Array.isArray(event.data)) {
        const [, type, value] = event.data;

        if (type === 'BROADCAST_IFRAME_HEIGHT') {
          applyEmbedHeight(frame, value);
        }

        return;
      }

      if (event.origin.includes('instagram.com') && typeof event.data === 'string') {
        const payload = event.data.trim();
        if (!payload) return;

        try {
          const parsed = JSON.parse(payload);

          if (parsed?.type === 'MEASURE' && parsed?.details?.height) {
            applyEmbedHeight(frame, parsed.details.height);
          }
        } catch (error) {
          // Ignore malformed messages from embeds we do not control.
        }
      }
    });

    window.addEventListener('load', () => {
      scanForFrames();
      processInstagram();
    });

  </script>
  <script>
